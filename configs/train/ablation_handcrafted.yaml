# Ablation: replace the learned shared-MLP encoder with hand-crafted features
# (per-sensor min, mean, contact-flag). Tests whether the learned encoder
# outperforms simple statistics — if not, we have a representation problem.

run_name: ablation_handcrafted_v1
output_dir: runs/ablation_handcrafted_v1

data_dir: data/raw/near_contact
stats_path: stats.json
val_frac: 0.10
split_seed: 0
num_workers: 4

n_sensors: 32
d_model: 512
chunk_size: 100
encoder_type: handcrafted    # <-- the only change
fusion_type: concat
vlm_only: false
sensor_mask: null
beta_kl: 10.0

vlm_model_name: allenai/Molmo-4B-D-0924
dummy_vlm: false

batch_size: 8
lr: 1.0e-5
n_epochs: 2000
grad_clip: 1.0
log_every: 100

wandb_project: pla-corl
no_wandb: false
