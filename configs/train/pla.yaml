# PLA — full model (proximity stream ON).
# This is the headline run. Compare against configs/train/act_baseline.yaml.

run_name: pla_concat_v1
output_dir: runs/pla_concat_v1

# Data — set data_dir to wherever you collected. stats_path is generated by
# `python -m pla.data.normalize --data-dir <data_dir>`.
data_dir: data/raw/near_contact
stats_path: stats.json
val_frac: 0.10
split_seed: 0
num_workers: 4

# Model.
n_sensors: 32
d_model: 512
chunk_size: 100
encoder_type: shared_mlp     # PLA. Ablations: handcrafted | conv2d
fusion_type: concat          # PLA. Ablation: cross_attn
vlm_only: false              # <-- THE flag that distinguishes from baseline
sensor_mask: null            # list of indices to zero (wrist-only ablation)
beta_kl: 10.0

# Backbone — set dummy_vlm true for shape tests / smoke runs.
vlm_model_name: allenai/Molmo-4B-D-0924
dummy_vlm: false

# Optimization.
batch_size: 8
lr: 1.0e-5
n_epochs: 2000
grad_clip: 1.0
log_every: 100
min_grad_norm: 1.0e-8         # warns when proximity encoder grads collapse

# Logging.
wandb_project: pla-corl
no_wandb: false
